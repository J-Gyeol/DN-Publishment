    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.0/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.0/ScrollTrigger.min.js"></script>
    <script>
        const scroller = new LocomotiveScroll({
            el: document.querySelector('[data-scroll-container]'),
            smooth: true
        })

        gsap.registerPlugin(ScrollTrigger)


        scroller.on('scroll', ScrollTrigger.update)

        ScrollTrigger.scrollerProxy(
            '.container', {
            scrollTop(value) {
                return arguments.length ?
                    scroller.scrollTo(value, 0, 0) :
                    scroller.scroll.instance.scroll.y
            },
            getBoundingClientRect() {
                return {
                    left: 0, top: 0,
                    width: window.innerWidth,
                    height: window.innerHeight
                }
            }
        }
        )


        ScrollTrigger.create({
            trigger: '#Type',
            scroller: '.container',
            start: 'left bottom',
            end: '+=1000',
            animation: TweenMax.to('#Type', { rotation: 360 * 6, transformOrigin: "50% 50%", duration: .25, ease: 'none', }),
            scrub: .2,
            // markers: true
        })

        ScrollTrigger.create({
            trigger: '.image-mask',
            scroller: '.container',
            start: 'top+=0% 50%',
            end: 'bottom-=40% 50%',
            animation: gsap.to('.image-mask', { height: 80 + 'vh', backgroundPosition: "+=0 1%" }), repeat: -1, onComplete: function () {
                $("#bg").css({ backgroundPosition: "50% 90%" });
            },
            scrub: true,
            // markers: true
        })


        ScrollTrigger.addEventListener('refresh', () => scroller.update())


        ScrollTrigger.refresh()
    </script>
